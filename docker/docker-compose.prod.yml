services:
  rabbitdocs-prod:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    image: rabbitdocs:prod
    container_name: rabbitdocs-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - MCP_PORT=4001
      - MCP_HOST=0.0.0.0
      - HOSTNAME=0.0.0.0
      - DATA_ROOT=/app/data
      - RABBITDOCS_HOME=/app/data/home
    volumes:
      # 生产数据使用命名卷，独立于宿主机目录
      - rabbitdocs_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  rabbitdocs_data:
